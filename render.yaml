services:
  - type: cron
    name: kurioticket-price-alerts
    runtime: node
    plan: starter
    branch: main
    autoDeploy: true
    schedule: '0 * * * *'
    buildCommand: 'true'
    startCommand: >-
      curl -fsS -X POST "https://kurioticket.com/api/cron/price-alerts"
      -H "Authorization: Bearer $PRICE_ALERTS_CRON_SECRET"
      -H "Content-Type: application/json"
    envVars:
      - key: PRICE_ALERTS_CRON_SECRET
        sync: false

  - type: cron
    name: kurioticket-saved-trip-reminders
    runtime: node
    plan: starter
    branch: main
    autoDeploy: true
    schedule: '0 * * * *'
    buildCommand: 'true'
    startCommand: >-
      curl -fsS -X POST "https://kurioticket.com/api/cron/saved-trip-reminders"
      -H "Authorization: Bearer $SAVED_TRIP_REMINDERS_CRON_SECRET"
      -H "Content-Type: application/json"
    envVars:
      - key: SAVED_TRIP_REMINDERS_CRON_SECRET
        sync: false

  - type: cron
    name: kurioticket-travel-inspiration
    runtime: node
    plan: starter
    branch: main
    autoDeploy: true
    schedule: '0 * * * *'
    buildCommand: 'true'
    startCommand: >-
      curl -fsS -X POST "https://kurioticket.com/api/cron/travel-inspiration"
      -H "Authorization: Bearer $TRAVEL_INSPIRATION_CRON_SECRET"
      -H "Content-Type: application/json"
    envVars:
      - key: TRAVEL_INSPIRATION_CRON_SECRET
        sync: false


  - type: cron
    name: kurioticket-route-watch-updates
    runtime: node
    plan: starter
    branch: main
    autoDeploy: true
    schedule: '0 * * * *'
    buildCommand: 'true'
    startCommand: >-
      curl -fsS -X POST "https://kurioticket.com/api/cron/route-watch-updates"
      -H "Authorization: Bearer $ROUTE_WATCH_UPDATES_CRON_SECRET"
      -H "Content-Type: application/json"
    envVars:
      - key: ROUTE_WATCH_UPDATES_CRON_SECRET
        sync: false

  - type: cron
    name: kurioticket-homepage-fares-refresh
    runtime: node
    plan: starter
    branch: main
    autoDeploy: true
    schedule: '0 */4 * * *'
    buildCommand: 'true'
    startCommand: >-
      curl -fsS -X POST "https://kurioticket.com/api/internal/homepage-fares/refresh"
      -H "Authorization: Bearer $HOMEPAGE_FARES_CRON_SECRET"
      -H "Content-Type: application/json"
    envVars:
      - key: HOMEPAGE_FARES_CRON_SECRET
        sync: false

  - type: web
    name: kurioticket-web
    runtime: node
    plan: free
    branch: main
    autoDeploy: true
    buildCommand: npm ci && npm run db:deploy:render && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 24.14.0
      - key: DATABASE_URL
        fromDatabase:
          name: kurioticket-postgres
          property: connectionString
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: AUTH_SECRET
        sync: false
      - key: NEXTAUTH_SECRET
        sync: false
      - key: NEXTAUTH_URL
        sync: false
      - key: AUTH_GOOGLE_ID
        sync: false
      - key: AUTH_GOOGLE_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: SAVED_TRIP_REMINDERS_CRON_SECRET
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_MONTHLY_PRICE_ID
        sync: false
      - key: STRIPE_YEARLY_PRICE_ID
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.4-mini
      - key: AMADEUS_CLIENT_ID
        sync: false
      - key: AMADEUS_CLIENT_SECRET
        sync: false
      - key: DUFFEL_API_KEY
        sync: false
      - key: KIWI_API_KEY
        sync: false
      - key: TRAVELPAYOUTS_API_KEY
        sync: false
      - key: TRAVELPAYOUTS_MARKER
        sync: false
      - key: HOTEL_API_KEY
        sync: false
      - key: ADMIN_EMAILS
        sync: false
      - key: HOMEPAGE_FARES_CRON_SECRET
        sync: false
      - key: PRICE_ALERTS_CRON_SECRET
        sync: false
      - key: ROUTE_WATCH_UPDATES_CRON_SECRET
        sync: false
      # Return production to exact `live` when an approved Cars provider is connected.
      - key: CARS_RESULTS_MODE
        value: demo

  - type: web
    name: kurioticket-web-staging
    runtime: node
    plan: free
    branch: dev
    autoDeploy: true
    buildCommand: npm ci && npm run db:deploy:render && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 24.14.0
      - key: DATABASE_URL
        fromDatabase:
          name: kurioticket-postgres-staging
          property: connectionString
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: AUTH_SECRET
        sync: false
      - key: NEXTAUTH_SECRET
        sync: false
      - key: NEXTAUTH_URL
        sync: false
      - key: AUTH_GOOGLE_ID
        sync: false
      - key: AUTH_GOOGLE_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: SAVED_TRIP_REMINDERS_CRON_SECRET
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_MONTHLY_PRICE_ID
        sync: false
      - key: STRIPE_YEARLY_PRICE_ID
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.4-mini
      - key: AMADEUS_CLIENT_ID
        sync: false
      - key: AMADEUS_CLIENT_SECRET
        sync: false
      - key: DUFFEL_API_KEY
        sync: false
      - key: KIWI_API_KEY
        sync: false
      - key: TRAVELPAYOUTS_API_KEY
        sync: false
      - key: TRAVELPAYOUTS_MARKER
        sync: false
      - key: HOTEL_API_KEY
        sync: false
      - key: ADMIN_EMAILS
        sync: false
      - key: HOMEPAGE_FARES_CRON_SECRET
        sync: false
      - key: PRICE_ALERTS_CRON_SECRET
        sync: false
      - key: ROUTE_WATCH_UPDATES_CRON_SECRET
        sync: false
      - key: CARS_RESULTS_MODE
        value: demo

databases:
  - name: kurioticket-postgres
    databaseName: kurioticket
    user: kurioticket
    plan: free

  - name: kurioticket-postgres-staging
    databaseName: kurioticket_staging
    user: kurioticket_staging
    plan: free
