services:
  - type: web
    name: curioticket-web
    runtime: node
    plan: free
    branch: main
    autoDeploy: true
    buildCommand: npm ci && npm run db:deploy:render && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 24.14.0
      - key: DATABASE_URL
        fromDatabase:
          name: curioticket-postgres
          property: connectionString
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: AUTH_SECRET
        sync: false
      - key: NEXTAUTH_SECRET
        sync: false
      - key: NEXTAUTH_URL
        sync: false
      - key: AUTH_GOOGLE_ID
        sync: false
      - key: AUTH_GOOGLE_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_MONTHLY_PRICE_ID
        sync: false
      - key: STRIPE_YEARLY_PRICE_ID
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.4-mini
      - key: AMADEUS_CLIENT_ID
        sync: false
      - key: AMADEUS_CLIENT_SECRET
        sync: false
      - key: DUFFEL_API_KEY
        sync: false
      - key: KIWI_API_KEY
        sync: false
      - key: TRAVELPAYOUTS_API_KEY
        sync: false
      - key: TRAVELPAYOUTS_MARKER
        sync: false
      - key: HOTEL_API_KEY
        sync: false
      - key: ADMIN_EMAILS
        sync: false
  - type: web
    name: curioticket-web-staging
    runtime: node
    plan: free
    branch: dev
    autoDeploy: true
    buildCommand: npm ci && npm run db:deploy:render && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 24.14.0
      - key: DATABASE_URL
        fromDatabase:
          name: curioticket-postgres-staging
          property: connectionString
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: AUTH_SECRET
        sync: false
      - key: NEXTAUTH_SECRET
        sync: false
      - key: NEXTAUTH_URL
        sync: false
      - key: AUTH_GOOGLE_ID
        sync: false
      - key: AUTH_GOOGLE_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_MONTHLY_PRICE_ID
        sync: false
      - key: STRIPE_YEARLY_PRICE_ID
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.4-mini
      - key: AMADEUS_CLIENT_ID
        sync: false
      - key: AMADEUS_CLIENT_SECRET
        sync: false
      - key: DUFFEL_API_KEY
        sync: false
      - key: KIWI_API_KEY
        sync: false
      - key: TRAVELPAYOUTS_API_KEY
        sync: false
      - key: TRAVELPAYOUTS_MARKER
        sync: false
      - key: HOTEL_API_KEY
        sync: false
      - key: ADMIN_EMAILS
        sync: false

databases:
  - name: curioticket-postgres
    databaseName: curioticket
    user: curioticket
    plan: free
  - name: curioticket-postgres-staging
    databaseName: curioticket_staging
    user: curioticket_staging
    plan: free
